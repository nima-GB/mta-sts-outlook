<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SECURE.DNS.OPERATIONS</title>
    <style>
        body {
            background-color: #000000;
            color: #00FF41;
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-shadow: 0 0 8px #00FF41;
        }
        .matrix-box {
            border: 2px solid #00FF41;
            padding: 40px;
            width: 80%;
            max-width: 600px;
            background: rgba(0, 20, 0, 0.9);
        }
        h1 { border-bottom: 1px solid #00FF41; padding-bottom: 10px; }
        .status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; }
        .secure { color: #00FF41; font-weight: bold; }
    </style>
</head>
<body>
    <div class="matrix-box">
        <h1>[ SYSTEM_SECURE ]</h1>
        <p>DOMAIN: NEGARANDEH.CO.UK</p>
        <div class="status-grid">
            <div>MTA-STS: <span class="secure">ENFORCED</span></div>
            <div>DMARC: <span class="secure">REJECT</span></div>
            <div>SPF: <span class="secure">PASS</span></div>
            <div>TLS-RPT: <span class="secure">ACTIVE</span></div>
        </div>
        <p style="margin-top:40px; font-size: 0.8em;">[ STATUS ]: PERIMETER_LOCKED</p>
    </div>
</body>
</html>
