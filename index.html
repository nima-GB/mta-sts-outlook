<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        :root { --neon: #00FF41; --bg: #000500; }
        body { background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; margin: 0; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        .scan-line { position: absolute; width: 100%; height: 2px; background: rgba(0, 255, 65, 0.1); animation: scan 4s linear infinite; }
        @keyframes scan { from { top: 0; } to { top: 100%; } }

        .dashboard { width: 80%; max-width: 800px; padding: 40px; border: 1px solid var(--neon); background: linear-gradient(180deg, #001100 0%, #000 100%); position: relative; box-shadow: 0 0 30px rgba(0, 255, 65, 0.2); }
        
        .telemetry-row { display: flex; justify-content: space-between; border-bottom: 1px solid #003300; padding: 10px 0; }
        
        .pulse-box { height: 100px; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .bar { width: 4px; background: var(--neon); animation: pulse 1s infinite alternate; }
        .bar:nth-child(1) { height: 20%; animation-delay: 0.1s; }
        .bar:nth-child(2) { height: 50%; animation-delay: 0.2s; }
        .bar:nth-child(3) { height: 80%; animation-delay: 0.3s; }
        .bar:nth-child(4) { height: 40%; animation-delay: 0.4s; }
        @keyframes pulse { to { transform: scaleY(2); } }

        .data-stream { font-size: 0.7em; opacity: 0.6; margin-top: 20px; white-space: pre; }
    </style>
</head>
<body>
    <div class="scan-line"></div>
    <div class="dashboard">
        <h2 style="text-align: center; letter-spacing: 10px;">TACTICAL_DATA_LINK</h2>
        <div class="pulse-box">
            <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
        </div>
        <div class="telemetry-row"><span>PROTOCOL: MTA-STS</span><span>STATUS: ENFORCED</span></div>
        <div class="telemetry-row"><span>CRYPTOGRAPHY: DMARC</span><span>STATUS: REJECT</span></div>
        <div class="telemetry-row"><span>PERIMETER: TLS-RPT</span><span>STATUS: ARMED</span></div>
        <div class="data-stream">
ROOT_ACCESS: GRANTED
ENCRYPTION_LAYER: 256-BIT_AES
THREAT_SURFACE: MINIMIZED
SECURITY_INDEX: 99.99%_IRONCLAD
        </div>
    </div>
</body>
</html>
