<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        body { background: #000; color: #00FF41; font-family: 'Courier New', monospace; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .grid { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-image: linear-gradient(#001100 1px, transparent 1px), linear-gradient(90deg, #001100 1px, transparent 1px); background-size: 40px 40px; }
        .core { z-index: 10; text-align: center; border: 1px solid #00FF41; padding: 50px; background: rgba(0,0,0,0.8); box-shadow: 0 0 20px #00FF41; }
        
        /* The Heartbeat Animation */
        .pulse-line { stroke: #00FF41; stroke-width: 2; fill: none; stroke-dasharray: 1000; stroke-dashoffset: 1000; animation: dash 2s linear infinite; }
        @keyframes dash { to { stroke-dashoffset: 0; } }
    </style>
</head>
<body>
    <div class="grid"></div>
    <div class="core">
        <h1>NEGARANDEH.CO.UK</h1>
        <svg width="200" height="60">
            <path class="pulse-line" d="M0,30 L40,30 L50,10 L60,50 L70,30 L200,30" />
        </svg>
        <div style="margin-top:20px;">[SYSTEM: IRONCLAD]</div>
        <div style="font-size: 0.6em; margin-top:20px;">SECURITY_PROTOCOL_ACTIVE_05212026</div>
    </div>
</body>
</html>
